apiVersion: apps/v1
kind: Deployment
metadata:
  name: simplebank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simplebank
  template:
    metadata:
      labels:
        app: simplebank
    spec:
      containers:
        - name: simplebank
          image: ghcr.io/520wheat/simplebank:latest
          ports:
            - containerPort: 8080
            - containerPort: 9090
          env:
            - name: DB_SOURCE
              valueFrom:
                secretKeyRef:
                  name: simplebank-secret
                  key: db-source
            - name: TOKEN_SYMMETRIC_KEY
              valueFrom:
                secretKeyRef:
                  name: simplebank-secret
                  key: token-symmetric-key
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: simplebank
spec:
  selector:
    app: simplebank
  ports:
    - name: http
      port: 80
      targetPort: 8080
    - name: grpc
      port: 9090
      targetPort: 9090
  type: ClusterIP
