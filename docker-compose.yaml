services:
    postgres:
      image: postgres:16-alpine
      container_name: simplebank-postgres
      environment:
        POSTGRES_USER: root
        POSTGRES_PASSWORD: secret
        POSTGRES_DB: simple_bank
      ports:
        - "5432:5432"
      volumes:
        - pgdata:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U root -d simple_bank"]
        interval: 5s
        timeout: 5s
        retries: 5

volumes:
  pgdata: